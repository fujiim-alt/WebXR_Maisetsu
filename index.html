<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>WebXR 地下模型テスト</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
    }

    #info {
      position: fixed;
      left: 12px;
      right: 12px;
      top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.9);
      color: #111;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
      pointer-events: none;
    }

    #statusLabel {
      position: fixed;
      left: 50%;
      bottom: 286px;
      transform: translateX(-50%);
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      z-index: 20;
      pointer-events: none;
      white-space: nowrap;
    }

    #controls {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 112px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      z-index: 30;
      pointer-events: auto;
    }

    .control-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
    }

    .control-button {
      min-width: 72px;
      padding: 11px 12px;
      border: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      color: #111;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.28);
      touch-action: manipulation;
    }

    .move-button {
      min-width: 58px;
    }

    #deleteModel {
      position: fixed;
      left: 16px;
      bottom: 24px;
      min-width: 72px;
      background: rgba(255, 80, 80, 0.95);
      color: #fff;
      z-index: 40;
    }

    #angleToggle {
      position: fixed;
      right: 16px;
      bottom: 24px;
      min-width: 92px;
      background: rgba(255, 255, 255, 0.95);
      color: #111;
      z-index: 40;
    }

    .control-button:active {
      transform: scale(0.96);
    }
  </style>
</head>

<body>
  <div id="info">
    WebXR 地下模型テスト<br>
    地面をタップすると模型を1個だけ配置します。<br>
    回転角度は右下ボタンで切り替えできます。
  </div>

  <div id="statusLabel">
    未配置 / 角度 5°
  </div>

  <div id="controls">
    <div class="control-row">
      <button class="control-button" id="rotateLeft">← 回転</button>
      <button class="control-button" id="rotateRight">回転 →</button>
    </div>

    <div class="control-row">
      <button class="control-button move-button" id="moveForward">前</button>
    </div>

    <div class="control-row">
      <button class="control-button move-button" id="moveLeft">左</button>
      <button class="control-button move-button" id="moveBack">後</button>
      <button class="control-button move-button" id="moveRight">右</button>
    </div>
  </div>

  <button class="control-button" id="deleteModel">削除</button>
  <button class="control-button" id="angleToggle">角度 5°</button>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { ARButton } from "https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js";

    let camera;
    let scene;
    let renderer;
    let controller;
    let reticle;
    let hitTestSource = null;
    let hitTestSourceRequested = false;

    // 配置できる模型は1個だけ
    let placedModel = null;

    // 位置微調整量：1cm
    const moveStep = 0.01;

    // 回転角度：30° / 5° / 1° を切り替え
    const rotateStepsDeg = [30, 5, 1];
    let rotateStepIndex = 1; // 初期値は5°
    let rotateStep = THREE.MathUtils.degToRad(rotateStepsDeg[rotateStepIndex]);

    const statusLabel = document.getElementById("statusLabel");

    const rotateLeftButton = document.getElementById("rotateLeft");
    const rotateRightButton = document.getElementById("rotateRight");
    const deleteModelButton = document.getElementById("deleteModel");
    const angleToggleButton = document.getElementById("angleToggle");

    const moveForwardButton = document.getElementById("moveForward");
    const moveBackButton = document.getElementById("moveBack");
    const moveLeftButton = document.getElementById("moveLeft");
    const moveRightButton = document.getElementById("moveRight");

    // AR中にボタンを押した時、地面タップとして誤認されないようにする
    document.body.addEventListener("beforexrselect", function(event) {
      if (
        event.target.closest("#controls") ||
        event.target.closest("#deleteModel") ||
        event.target.closest("#angleToggle")
      ) {
        event.preventDefault();
      }
    });

    function stopButtonEvent(event) {
      event.preventDefault();
      event.stopPropagation();
    }

    const allButtons = document.querySelectorAll(".control-button");
    allButtons.forEach(function(button) {
      button.addEventListener("pointerdown", stopButtonEvent);
    });

    rotateLeftButton.addEventListener("click", function(event) {
      stopButtonEvent(event);

      if (!placedModel) {
        updateStatus("未配置");
        return;
      }

      placedModel.rotateY(-rotateStep);
      updateStatus("左回転 " + getCurrentAngleText());
    });

    rotateRightButton.addEventListener("click", function(event) {
      stopButtonEvent(event);

      if (!placedModel) {
        updateStatus("未配置");
        return;
      }

      placedModel.rotateY(rotateStep);
      updateStatus("右回転 " + getCurrentAngleText());
    });

    angleToggleButton.addEventListener("click", function(event) {
      stopButtonEvent(event);

      rotateStepIndex = (rotateStepIndex + 1) % rotateStepsDeg.length;
      rotateStep = THREE.MathUtils.degToRad(rotateStepsDeg[rotateStepIndex]);

      updateAngleButton();
      updateStatus("角度 " + getCurrentAngleText());
    });

    deleteModelButton.addEventListener("click", function(event) {
      stopButtonEvent(event);

      if (!placedModel) {
        updateStatus("削除対象なし");
        return;
      }

      scene.remove(placedModel);
      placedModel = null;
      updateStatus("削除しました");
    });

    moveForwardButton.addEventListener("click", function(event) {
      stopButtonEvent(event);
      moveModel("forward");
    });

    moveBackButton.addEventListener("click", function(event) {
      stopButtonEvent(event);
      moveModel("back");
    });

    moveLeftButton.addEventListener("click", function(event) {
      stopButtonEvent(event);
      moveModel("left");
    });

    moveRightButton.addEventListener("click", function(event) {
      stopButtonEvent(event);
      moveModel("right");
    });

    function getCurrentAngleText() {
      return rotateStepsDeg[rotateStepIndex] + "°";
    }

    function updateAngleButton() {
      angleToggleButton.textContent = "角度 " + getCurrentAngleText();
    }

    function moveModel(direction) {
      if (!placedModel) {
        updateStatus("未配置");
        return;
      }

      // translateX / translateZ は、模型自身の向きを基準に移動します
      if (direction === "forward") {
        placedModel.translateZ(-moveStep);
        updateStatus("前へ 1cm");
      }

      if (direction === "back") {
        placedModel.translateZ(moveStep);
        updateStatus("後へ 1cm");
      }

      if (direction === "left") {
        placedModel.translateX(-moveStep);
        updateStatus("左へ 1cm");
      }

      if (direction === "right") {
        placedModel.translateX(moveStep);
        updateStatus("右へ 1cm");
      }
    }

    function updateStatus(message) {
      const base = placedModel ? "配置済み" : "未配置";
      const angle = "角度 " + getCurrentAngleText();

      if (message) {
        statusLabel.textContent = message + " / " + angle;
      } else {
        statusLabel.textContent = base + " / " + angle;
      }
    }

    init();
    animate();

    function init() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(
        70,
        window.innerWidth / window.innerHeight,
        0.01,
        20
      );

      const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 2);
      scene.add(light);

      renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true
      });

      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;

      document.body.appendChild(renderer.domElement);

      document.body.appendChild(
        ARButton.createButton(renderer, {
          requiredFeatures: ["hit-test"],
          optionalFeatures: ["dom-overlay"],
          domOverlay: {
            root: document.body
          }
        })
      );

      controller = renderer.xr.getController(0);
      controller.addEventListener("select", onSelect);
      scene.add(controller);

      const ringGeometry = new THREE.RingGeometry(0.08, 0.10, 32).rotateX(-Math.PI / 2);
      const ringMaterial = new THREE.MeshBasicMaterial({
        color: 0x00ff00
      });

      reticle = new THREE.Mesh(ringGeometry, ringMaterial);
      reticle.matrixAutoUpdate = false;
      reticle.visible = false;
      scene.add(reticle);

      updateAngleButton();
      updateStatus();

      window.addEventListener("resize", onWindowResize);
    }

    function onSelect() {
      if (!reticle.visible) {
        return;
      }

      // 1個までなので、既存模型があれば削除して置き直す
      if (placedModel) {
        scene.remove(placedModel);
        placedModel = null;
      }

      const model = createUndergroundMiniModel();

      model.position.setFromMatrixPosition(reticle.matrix);
      model.quaternion.setFromRotationMatrix(reticle.matrix);

      scene.add(model);
      placedModel = model;

      updateStatus("配置しました");
    }

    function createUndergroundMiniModel() {
      const group = new THREE.Group();

      // 小さい模型版
      // 45m -> 45cm = 0.45m
      // 16m -> 16cm = 0.16m
      // 2.5m -> 2.5cm = 0.025m
      // 6.0m -> 6cm = 0.06m

      const width = 0.45;
      const depth = 0.16;

      const lightHeight = 0.025;
      const darkHeight = 0.035;

      const lightCenterY = -lightHeight / 2;
      const darkCenterY = -lightHeight - darkHeight / 2;

      // GL 0cm ～ -2.5cm：薄色
      const lightBoxGeometry = new THREE.BoxGeometry(width, lightHeight, depth);
      const lightBoxMaterial = new THREE.MeshStandardMaterial({
        color: 0x00aaff,
        transparent: true,
        opacity: 0.22,
        depthWrite: false
      });

      const lightBox = new THREE.Mesh(lightBoxGeometry, lightBoxMaterial);
      lightBox.position.y = lightCenterY;
      group.add(lightBox);

      // GL -2.5cm ～ -6.0cm：濃色
      const darkBoxGeometry = new THREE.BoxGeometry(width, darkHeight, depth);
      const darkBoxMaterial = new THREE.MeshStandardMaterial({
        color: 0x0044ff,
        transparent: true,
        opacity: 0.42,
        depthWrite: false
      });

      const darkBox = new THREE.Mesh(darkBoxGeometry, darkBoxMaterial);
      darkBox.position.y = darkCenterY;
      group.add(darkBox);

      // 薄色ボックス枠線
      const lightEdges = new THREE.EdgesGeometry(lightBoxGeometry);
      const lightLine = new THREE.LineSegments(
        lightEdges,
        new THREE.LineBasicMaterial({ color: 0x00ccff })
      );
      lightLine.position.y = lightCenterY;
      group.add(lightLine);

      // 濃色ボックス枠線
      const darkEdges = new THREE.EdgesGeometry(darkBoxGeometry);
      const darkLine = new THREE.LineSegments(
        darkEdges,
        new THREE.LineBasicMaterial({ color: 0x0033ff })
      );
      darkLine.position.y = darkCenterY;
      group.add(darkLine);

      // 地表枠
      const groundFrame = createRectangleFrame(width, depth, 0xffaa00);
      groundFrame.position.y = 0.002;
      group.add(groundFrame);

      // 四隅十字マーカー
      const markerLength = 0.035;
      const markerThickness = 0.006;
      const markerY = 0.004;

      const corners = [
        [-width / 2, -depth / 2],
        [ width / 2, -depth / 2],
        [-width / 2,  depth / 2],
        [ width / 2,  depth / 2]
      ];

      for (const [x, z] of corners) {
        const cross = createCrossMarker(markerLength, markerThickness, 0xff3333);
        cross.position.set(x, markerY, z);
        group.add(cross);
      }

      return group;
    }

    function createRectangleFrame(width, depth, color) {
      const group = new THREE.Group();

      const barThickness = 0.006;
      const barHeight = 0.006;

      const material = new THREE.MeshBasicMaterial({
        color: color
      });

      const longBarGeometry = new THREE.BoxGeometry(width, barHeight, barThickness);
      const shortBarGeometry = new THREE.BoxGeometry(barThickness, barHeight, depth);

      const front = new THREE.Mesh(longBarGeometry, material);
      front.position.z = -depth / 2;
      group.add(front);

      const back = new THREE.Mesh(longBarGeometry, material);
      back.position.z = depth / 2;
      group.add(back);

      const left = new THREE.Mesh(shortBarGeometry, material);
      left.position.x = -width / 2;
      group.add(left);

      const right = new THREE.Mesh(shortBarGeometry, material);
      right.position.x = width / 2;
      group.add(right);

      return group;
    }

    function createCrossMarker(length, thickness, color) {
      const group = new THREE.Group();

      const material = new THREE.MeshBasicMaterial({
        color: color
      });

      const xBar = new THREE.Mesh(
        new THREE.BoxGeometry(length, thickness, thickness),
        material
      );
      group.add(xBar);

      const zBar = new THREE.Mesh(
        new THREE.BoxGeometry(thickness, thickness, length),
        material
      );
      group.add(zBar);

      return group;
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      renderer.setAnimationLoop(render);
    }

    function render(timestamp, frame) {
      if (frame) {
        const referenceSpace = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();

        if (!hitTestSourceRequested) {
          session.requestReferenceSpace("viewer").then(function(viewerSpace) {
            session.requestHitTestSource({ space: viewerSpace }).then(function(source) {
              hitTestSource = source;
            });
          });

          session.addEventListener("end", function() {
            hitTestSourceRequested = false;
            hitTestSource = null;
          });

          hitTestSourceRequested = true;
        }

        if (hitTestSource) {
          const hitTestResults = frame.getHitTestResults(hitTestSource);

          if (hitTestResults.length) {
            const hit = hitTestResults[0];
            reticle.visible = true;
            reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
          } else {
            reticle.visible = false;
          }
        }
      }

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
